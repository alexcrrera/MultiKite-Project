<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([46.0, -1.0], 6)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

var vessels = {}

var socket = new WebSocket("ws://localhost:8765")

socket.onmessage = function(event)
{
    var data = JSON.parse(event.data)

    var mmsi = data.mmsi
    var lat = data.lat
    var lon = data.lon
    var name = data.name

    if(vessels[mmsi])
    {
        vessels[mmsi].setLatLng([lat,lon])
    }
    else
    {
        var marker = L.marker([lat,lon]).addTo(map)
        marker.bindPopup(name)

        vessels[mmsi] = marker
    }
}

</script>

</body>

</html>
